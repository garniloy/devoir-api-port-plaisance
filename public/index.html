<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil</title>
    <link rel="stylesheet" href="stylesheets/style.css">
</head>
<body>

    <header class="header">
        <div class="container header-content">
            <h1 class="logo">Port de<span>Plaisance</span></h1>
            
            <a href="/documentation" target="_blank" class="doc-link">API Documentation</a>
        </div>
    </header>

    <main class="main">
        <div class="container main-content">

            <div class="description">
                <h2>Welcome</h2>
                <p>The only management interface of Plaisance marina</p>
            </div>

            <div class="login-card">
                <div class="login-form" >
                    <h3>Login</h3>

                    
                    <input class="input" type="text" id="email" placeholder="Entrez votre e-mail">
                    <input
                        id="password"
                        name="password"
                        type="password" 
                        class="input" 
                        placeholder="Enter your password"
                        
                        
                    >
                    <button class="btn-primary" id="submit-btn">
                        Login
                    </button>
                </div>
            </div>

        </div>
    </main>
<script src="/javascripts/script.js"></script>
</body>
</html>
